<!DOCTYPE html><html lang='ha'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Gwani AI</title></head><body><div id='chat'></div><input id='text'><button onclick='send()'>Aika</button><script>const WORKER='https://bashar-ai.bashirbelloaliyu0.workers.dev/';async function send(){const m=text.value;const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:m})});const d=await r.json();chat.innerHTML+='<p><b>Kai:</b>'+m+'</p><p><b>AI:</b>'+(d.choices?.[0]?.message?.content||JSON.stringify(d))+'</p>';text.value='';}</script></body></html>
