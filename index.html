<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gwani AI - Abokin Taimakonka</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background-color: #1b4d3e; 
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 16px;
            line-height: 1.4;
        }
        .user-message {
            background-color: #1b4d3e;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            font-weight: 500;
        }
        .ai-message {
            background-color: white;
            color: #1a1a1a;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.06);
            font-weight: 500;
        }
        .footer-controls {
            display: flex;
            flex-direction: column;
            background-color: white;
            border-top: 1px solid #ddd;
            padding: 10px;
            gap: 10px;
        }
        .input-container {
            display: flex;
            width: 100%;
        }
        .input-container input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
            padding-left: 20px;
        }
        .input-container button {
            background-color: #1b4d3e;
            color: white;
            border: none;
            padding: 12px 25px;
            margin-left: 10px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .whatsapp-container {
            width: 100%;
            text-align: center;
        }
        .whatsapp-btn {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <div class="header">🤖 Gwani AI - Fasahar AI Ta Hausa</div>

    <div class="chat-container" id="chatBox">
        <div class="message ai-message">
            Barkanku da zuwa! Sannu abokina Bashir. Ni ne Gwani AI, fasahar da aka gina ta musamman don taimaka muku da amsa tambayoyi cikin yaren Hausa lafiya lau. Menene zamuyi yanzu?
        </div>
    </div>

    <div class="footer-controls">
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Rubuta tambayarka anan...">
            <button onclick="sendMessage()">Aika</button>
        </div>
        
        <div class="whatsapp-container">
            <a href="https://wa.me..." 
               target="_blank" 
               style="text-decoration: none; display: inline-block; width: 100%;">
                <button class="whatsapp-btn" type="button">
                    📢 Tura Wa Abokai A WhatsApp
                </button>
            </a>
        </div>
    </div>

    <script>
        async function sendMessage() {
            let inputField = document.getElementById("userInput");
            let chatBox = document.getElementById("chatBox");
            let messageText = inputField.value.trim();

            if (messageText === "") return;

            let userDiv = document.createElement("div");
            userDiv.className = "message user-message";
            userDiv.innerText = messageText;
            chatBox.appendChild(userDiv);

            inputField.value = ""; 
            chatBox.scrollTop = chatBox.scrollHeight; 

            let loadingDiv = document.createElement("div");
            loadingDiv.className = "message ai-message";
            loadingDiv.innerText = "Gwani AI yana tunani... 🔄";
            loadingDiv.id = "loading";
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Kiran kofa ta musamman ta hanyar madaidacin tsarin haɗin Google Gemini kyauta
                const response = await fetch("https://pollinations.ai", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "openai", // Canza uwar gida zuwa tsarin openai backend domin gudun matsalar sabar jiya
                        messages: [
                            { role: "system", content: "Kai ne Gwani AI. Abokin taimakon mutane cikin yaren Hausa. Ka amsa tambayoyi a gajarce, cikin sauki da Hausa mai dadi." },
                            { role: "user", content: messageText }
                        ]
                    })
                });

                let aiReply = await response.text();
                document.getElementById("loading").remove();

                let aiDiv = document.createElement("div");
                aiDiv.className = "message ai-message";
                aiDiv.innerText = aiReply;
                chatBox.appendChild(aiDiv);
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {
                if(document.getElementById("loading")) {
                    document.getElementById("loading").remove();
                }
                let errorDiv = document.createElement("div");
                errorDiv.className = "message ai-message";
                errorDiv.innerText = "Kash! An sami ɗan matsala wajen haɗawa da sabar. Maza sake jarraba aikawa.";
                chatBox.appendChild(errorDiv);
            }
        }
    </script>
</body>
</html>
